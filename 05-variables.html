<!DOCTYPE html>
<html lang="en">
<head>
    <title>Variables</title>
</head>
<body>
    <script>
        // ; is like a period in english
        let variable1 = 3;
        console.log(variable1);

        let calculation = 2+2;
        console.log(calculation+2);
        
        variable1 = 5; //reassign a new value. why dont we use let here? bcuz we dont create it( the name variable1 is ady being used) but reassign a new value. 
        console.log(variable1);
        console.log(typeof variable1); 

        const variable3 =  2; //same as let but you cannot change the value later
        var variable4 = 4;
    </script>    
</body>
