<!DOCTYPE html>
<html lang="en">
<head>
    <title>dom rock paper scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick ="
        playGame('Rock');
        ">Rock</button>

    <button onclick="
        playGame('Paper');
        ">Paper</button>

    <button onclick="
        playGame('Scissors');
        "
        >Scissors</button>


    <p class = 'winOrLose'></p>
    <p class = 'moves'></p>    
    <p class ='scoreBoard'></p>

    <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.draws = 0;
        localStorage.removeItem('score');
        updateScore();
        ">Reset score</button>
    
    <script>
        const score = JSON.parse(localStorage.getItem('score')) || { wins:0, losses:0, draws:0 };

        function playGame(playerMove){
            const computerMove = pickComputerMove();
            let result = '';
            if (playerMove === 'Rock'){
                if (computerMove === 'scissors'){  
                    result = 'You Win';
                } else if (computerMove ==='paper'){
                    result = 'You Lose';
                } else if (computerMove ==='rock'){
                    result = 'Draw';
                }
            } else if (playerMove === 'Scissors'){
                if (computerMove === 'rock'){
                    result = 'You Lose';
                } else if (computerMove ==='paper'){
                    result = 'You Win';
                } else if (computerMove ==='scissors'){
                    result = 'Draw';
                }
            } else if (playerMove ==='Paper'){
                if (computerMove === 'rock'){
                    result = 'You Win';
                } else if (computerMove ==='paper'){
                    result = 'Draw';
                } else if (computerMove ==='scissors'){
                    result = 'You Lose';
                } 
            } 
            
            if(result === 'You Win'){
                score.wins = score.wins + 1;
            } else if (result === 'You Lose'){
                score.losses += 1;
            } else if (result === 'Draw'){
                score.draws += 1;
            }

            localStorage.setItem('score',JSON.stringify(score));
            updateScore();

            document.querySelector('.winOrLose')
                .innerHTML = result;

            document.querySelector('.moves')
                .innerHTML = `You pick ${playerMove} and the computer pick ${computerMove}`;                

            return alert(`You pick ${playerMove} and the computer pick ${computerMove}, ${result}! 
Wins: ${score.wins}, Losses: ${score.losses}, Draws: ${score.draws}`);
        };

        function updateScore(){
            document.querySelector('.scoreBoard')
            .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Draws: ${score.draws}`;
        };

        function pickComputerMove(){
            const randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber >=0 && randomNumber<1/3){
                computerMove = 'rock';
            } else if (randomNumber >=1/3 && randomNumber<2/3){
                computerMove = 'paper';
            } else if (randomNumber >=2/3 && randomNumber<1){
                computerMove = 'scissors';
            }  return computerMove;   
        };
    </script>
</body>
</html>
