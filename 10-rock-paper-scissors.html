<!DOCTYPE html>
<html lang="en">
<head>
    <title>dom rock paper scissors</title>
    <link rel="stylesheet" href="styles/10-rock-paper-scissors.css">
</head>
<body>
    <p class = 'title'>Rock Paper Scissors</p>
    <button onclick ="
        playGame('rock');
        " class ="move-button"><img src = 'image\rock-emoji.png' class = 'move-icon'></button>

    <button onclick="
        playGame('paper');
        " class ="move-button"><img src = 'image\paper-emoji.png' class = 'move-icon'></button>

    <button onclick="
        playGame('scissors');
        " class ="move-button"><img src = 'image\scissors-emoji.png' class = 'move-icon'></button>


    <p class = 'winOrLose result' >Pick your move</p>
    <p class = 'moves css-moves' >You<img src = 'image\rock-emoji.png' class = 'move-icon'><img src = 'image\rock-emoji.png' class='move-icon'>Computer</p>    
    <p class ='scoreBoard css-score'>Wins:0, Losses:0, Draws:0</p>

    <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.draws = 0;
        localStorage.removeItem('score');
        updateScore();
        " class = "reset-button">Reset score</button>
    
    <script src="scripts/10-rock-paper-scissors.js"></script>
</body>
</html>
