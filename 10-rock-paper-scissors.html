<!DOCTYPE html>
<html lang="en">
<head>
    <title>dom rock paper scissors</title>
    <style>
        body{
            background-color: black;
            color: white;
            font-family: Arial;
        }

        .title{
            font-size: 30px;
            font-weight: bold;
        }

        .move-button{
            background :none ;
            border: 3px solid white;
            border-radius: 50%;
            padding: 8px;
            cursor: pointer;
        }

        .reset-button:hover{
            background: white;
            color: black;
        }        

        .move-icon{
            width: 80px;
            height: 80px;
            display: inline-block;
            transition: transform 0.15s ease;
            border-radius: 50%;
        }

        .move-icon:hover{
            transform: scale(1.2);
        }

        .reset-button{
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            padding: 8px 20px;
            cursor: pointer;
            font-family: Arial;
            font-size: 14px;
            margin-top: 12px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .result{
            font-size: 30px;
        }

        .css-moves{
            font-size: 30px;
        }

        .css-score{
            font-size: 30px;
        }
    </style>
</head>
<body>
    <p class = 'title'>Rock Paper Scissors</p>
    <button onclick ="
        playGame('rock');
        " class ="move-button"><img src = 'image\rock-emoji.png' class = 'move-icon'></button>

    <button onclick="
        playGame('paper');
        " class ="move-button"><img src = 'image\paper-emoji.png' class = 'move-icon'></button>

    <button onclick="
        playGame('scissors');
        " class ="move-button"><img src = 'image\scissors-emoji.png' class = 'move-icon'></button>


    <p class = 'winOrLose result' >Pick your move</p>
    <p class = 'moves css-moves' >You<img src = 'image\rock-emoji.png' class = 'move-icon'><img src = 'image\rock-emoji.png' class='move-icon'>Computer</p>    
    <p class ='scoreBoard css-score'>Wins:0, Losses:0, Draws:0</p>

    <button onclick="
        score.wins = 0;
        score.losses = 0;
        score.draws = 0;
        localStorage.removeItem('score');
        updateScore();
        " class = "reset-button">Reset score</button>
    
    <script>
        const score = JSON.parse(localStorage.getItem('score')) || { wins:0, losses:0, draws:0 };

        function playGame(playerMove){
            const computerMove = pickComputerMove();
            let result = '';
            if (playerMove === 'rock'){
                if (computerMove === 'scissors'){  
                    result = 'You Win';
                } else if (computerMove ==='paper'){
                    result = 'You Lose';
                } else if (computerMove ==='rock'){
                    result = 'Draw';
                }
            } else if (playerMove === 'scissors'){
                if (computerMove === 'rock'){
                    result = 'You Lose';
                } else if (computerMove ==='paper'){
                    result = 'You Win';
                } else if (computerMove ==='scissors'){
                    result = 'Draw';
                }
            } else if (playerMove ==='paper'){
                if (computerMove === 'rock'){
                    result = 'You Win';
                } else if (computerMove ==='paper'){
                    result = 'Draw';
                } else if (computerMove ==='scissors'){
                    result = 'You Lose';
                } 
            } 
            
            if(result === 'You Win'){
                score.wins = score.wins + 1;
            } else if (result === 'You Lose'){
                score.losses += 1;
            } else if (result === 'Draw'){
                score.draws += 1;
            }

            localStorage.setItem('score',JSON.stringify(score));
            updateScore();

            document.querySelector('.winOrLose')
                .innerHTML = result;

            document.querySelector('.moves')
                .innerHTML = `You<img src='image/${playerMove}-emoji.png' class='move-icon'><img src='image/${computerMove}-emoji.png' class='move-icon'>Computer`;                

            return alert(`You pick ${playerMove} and the computer pick ${computerMove}, ${result}! 
Wins: ${score.wins}, Losses: ${score.losses}, Draws: ${score.draws}`);
        };

        function updateScore(){
            document.querySelector('.scoreBoard')
            .innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Draws: ${score.draws}`;
        };

        function pickComputerMove(){
            const randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber >=0 && randomNumber<1/3){
                computerMove = 'rock';
            } else if (randomNumber >=1/3 && randomNumber<2/3){
                computerMove = 'paper';
            } else if (randomNumber >=2/3 && randomNumber<1){
                computerMove = 'scissors';
            }  return computerMove;   
        };
    </script>
</body>
</html>
