<!DOCTYPE html>
<html lang="en">
<head>
    <title>Boolean</title>
</head>
<body>
    <script>
    console.log(5 == '5.00');
    console.log(5 === '5.00');

    if (false){
        console.log('hello');
    } else {
        console.log('hello2');
    }
    
    const age = 18
    if (age>=20){
        console.log('you can drive');
    } else if (age>=18){
        console.log('you almost can drive');
    } else {
        console.log('you cannot drive')
    }

    if (true && true){
        console.log('logical operators') // && and operator
    }

    if (true || true){
        console.log('logical operators') // || or operator (as long as one side is true)
    }
    
    if (!true){
        console.log('logical operators') // && not operator
    }
    </script>
</body>
</html>
