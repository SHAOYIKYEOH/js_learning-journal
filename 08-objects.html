<!DOCTYPE html>
<html lang="en">
<head>
    <title>objects</title>
</head>
<body>
    <script>
        /*
        const products = {
            name : 'socks', //property : value
            price : 100
        };
        console.log(products.name) //(object.property)

        //modify the value
        products.name = 'wool socks'
        
        //add and delete
        products.newProperty = true;
        console.log(products);
        delete products.newProperty;
        console.log(products);
        */

        const product2 = {
            name:'pen',
            color:'blue',
            price:'100',
            'delivery-time':'1 days',
            ratings:{
                comment:'good',
                stars:'4.5'
            },
            fun: function function1(){
                console.log('function inside object'); //function inside object = method
            }
        };
        console.log(product2.name) //dot notation
        console.log(product2['color']) //bracket notation -  it allows us to access to properties that dont work with dot notation, like delivery-time. cause js treats - as minus and tries to do math
        console.log(product2['delivery-time'])
        console.log(product2.ratings)

        product2.fun()

        // JSON : an sytax that is similar to js objects. but json objects do not support functions and it must use double quotation "
        //convert JS objects to json object
        console.log(JSON.stringify(product2));
        const jsonObject = JSON.stringify(product2);
        console.log(JSON.parse(jsonObject));

        //pass by value
        let a = 1
        let b = a

        a = 100
        console.log(b)
        console.log(a)

        //pass by reference
        const test = {
            name: 'abc'
        };
          const test2 = test;


 //-----------------------------------  
        //without destructuring
        const object2 ={
            name:'python'
        };
        const object3 = object2.name

        //with destructuring
        const {name:anyname} = object2;
        console.log(anyname);


//-----------------------------------
        //shorthand property
        const object4={
            name: 'apple',
        };
        const {name}=object4;

        const object5={
            /*name: name*/
            name
        };
        console.log(object5)
        
//-----------------------------------
        //shorthand method
        const object6={
            name,
            //method: function method(){
            //    console.log('shorthand')
            //}
            method(){console.log('shorthand')} //用 shorthand 的时候，函数名就是属性名本身，不能另外起一个内部名字
        };
        

//-----------------------------------
        //built in object
        
        /*
        1. console.log()
        2. Math.random()
        3. localStorage.getItem()/removeItem()/setItem()
        4. JSON.stringify()/parse()
        */
        object6.method()
        </script>
</body>
</html>
